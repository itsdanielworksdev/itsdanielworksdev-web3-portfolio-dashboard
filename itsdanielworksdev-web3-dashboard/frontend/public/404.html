<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Daniel Works | Web3 Portfolio</title>
    <meta name="robots" content="noindex" />
    <script>
      // GitHub Pages SPA redirect trick
      // Encodes the full path into the query string so the main index.html
      // can decode it and pass it to React Router.
      // See: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // 1 = keep the repo name segment in the path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
